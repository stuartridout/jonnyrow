  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

font-size:13px;line-height:1;padding:4px 9px;border-radius:30px;box-shadow:0 3px 8px rgba(0,0,0,.25);margin-bottom:5px;white-space:nowrap\">{{ pctBig }}%<\u002Fdiv>\n          <div style=\"width:15px;height:15px;border-radius:50%;background:#fff;border:3px solid #D6303C;margin:0 auto;box-shadow:0 1px 4px rgba(0,0,0,.3)\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- stats -->\n      <div style=\"display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:center;gap:10px 40px;padding:22px 6px 6px;text-align:center\">\n        <div>\n          <div style=\"font-family:'Fredoka',sans-serif;font-weight:700;font-size:clamp(44px,8vw,68px);line-height:1;color:#D6303C\">{{ shownKmText }}<span style=\"font-size:.42em;color:#1c1a19;font-weight:600\"> {{ lab }}<\u002Fspan><\u002Fdiv>\n          <div style=\"font-size:13px;color:#7a716b;font-weight:600;letter-spacing:.04em;text-transform:uppercase;margin-top:4px\">rowed so far<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"width:1px;height:54px;background:#eee3dc\"><\u002Fdiv>\n        <div>\n          <div style=\"font-family:'Fredoka',sans-serif;font-weight:700;font-size:clamp(30px,5vw,44px);line-height:1;color:#87A428\">{{ pctBig }}%<\u002Fdiv>\n          <div style=\"font-size:13px;color:#7a716b;font-weight:600;letter-spacing:.04em;text-transform:uppercase;margin-top:4px\">of the way<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"width:1px;height:54px;background:#eee3dc\"><\u002Fdiv>\n        <div>\n          <div style=\"font-family:'Fredoka',sans-serif;font-weight:700;font-size:clamp(30px,5vw,44px);line-height:1;color:#5D2F88\">{{ remainText }}<span style=\"font-size:.5em;font-weight:600\"> {{ lab }}<\u002Fspan><\u002Fdiv>\n          <div style=\"font-size:13px;color:#7a716b;font-weight:600;letter-spacing:.04em;text-transform:uppercase;margin-top:4px\">still to go<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- DONATE -->\n    <div style=\"text-align:center;margin-top:34px\">\n      <a href=\"{{ donateUrl }}\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-flex;align-items:center;gap:14px;background:#87A428;color:#fff;font-family:'Fredoka',sans-serif;font-weight:700;font-size:clamp(22px,3vw,30px);text-decoration:none;padding:20px 46px;border-radius:70px;box-shadow:0 20px 40px -12px rgba(40,55,0,.55);transition:transform .15s\" style-hover=\"transform:translateY(-3px)\">\n        <span style=\"display:inline-flex;width:34px;height:34px;align-items:center;justify-content:center;background:rgba(255,255,255,.22);border-radius:50%;font-size:18px\">♥<\u002Fspan>\n        Donate to send Jonny\n      <\u002Fa>\n      <sc-if value=\"{{ donatePending }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"font-size:13px;opacity:.85;margin-top:12px\">Donations open soon via GoFundMe — check back, or share to spread the word.<\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ ABOUT JONNY ============ -->\n<section data-screen-label=\"About Jonny\" style=\"max-width:1000px;margin:0 auto;padding:64px 20px\">\n  <div style=\"display:flex;flex-wrap:wrap;gap:38px;align-items:center;justify-content:center\">\n    <div style=\"position:relative;flex:0 0 auto\">\n      <div style=\"width:230px;height:230px;border-radius:50%;overflow:hidden;border:7px solid #fff;box-shadow:0 24px 50px -22px rgba(0,0,0,.45)\">\n        <img src=\"51a9d7bb-a2f4-45ae-81fc-d6d22236a325\" alt=\"Jonny\" style=\"width:100%;height:100%;object-fit:cover;object-position:center 20%\">\n      <\u002Fdiv>\n      <div style=\"position:absolute;bottom:6px;right:-6px;background:#D6303C;color:#fff;font-family:'Bravely Script','Permanent Marker',cursive;text-transform:uppercase;letter-spacing:.02em;font-size:18px;padding:7px 16px;border-radius:40px;transform:rotate(-4deg);box-shadow:0 8px 18px -6px rgba(0,0,0,.4)\">That's Jonny!<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:1 1 340px;max-width:480px\">\n      <div style=\"font-family:'Fredoka',sans-serif;font-weight:700;font-size:13px;letter-spacing:.12em;color:#D6303C;text-transform:uppercase;margin-bottom:8px\">Meet the rower<\u002Fdiv>\n      <h2 style=\"font-family:'Fredoka',sans-serif;font-weight:700;font-size:34px;line-height:1.05;margin:0 0 14px\">One Scout, one rowing machine, 1,350&nbsp;km.<\u002Fh2>\n      <p style=\"font-size:17px;line-height:1.6;color:#4a433f;margin:0 0 18px\">Jonny has been selected to represent his unit at the World Scout Jamboree in Poland — the trip of a lifetime, but it isn't cheap. So he's earning his place the brave way: clocking up the entire Milton Keynes-to-Gdańsk distance on the rowing machine, kilometre by kilometre, and asking for your support along the way.<\u002Fp>\n      <div style=\"font-family:'Bravely Script','Permanent Marker',cursive;text-transform:uppercase;letter-spacing:.02em;font-size:30px;color:#D6303C;transform:rotate(-1.5deg)\">Everything you do, do it bravely.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ ROUTE MAP ============ -->\n<section data-screen-label=\"Route map\" style=\"background:#fff;padding:64px 20px;border-top:1px solid #efe9e4;border-bottom:1px solid #efe9e4\">\n  <div style=\"max-width:1000px;margin:0 auto\">\n    <div style=\"text-align:center;margin-bottom:30px\">\n      <div style=\"font-family:'Fredoka',sans-serif;font-weight:700;font-size:13px;letter-spacing:.12em;color:#5D2F88;text-transform:uppercase;margin-bottom:6px\">The route<\u002Fdiv>\n      <h2 style=\"font-family:'Fredoka',sans-serif;font-weight:700;font-size:34px;margin:0\">Across the North Sea to Poland<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"border-radius:24px;overflow:hidden;background:linear-gradient(180deg,#dff0fa,#c4e4f4);box-shadow:0 20px 44px -26px rgba(0,0,0,.3)\">\n      <svg viewBox=\"0 0 1000 460\" style=\"display:block;width:100%;height:auto\">\n        <g fill=\"#d8e4ad\" stroke=\"#aebf80\" stroke-width=\"1.8\" stroke-linejoin=\"round\">\n          <path d=\"M485.8 25 L491.5 49.5 L542.7 61.7 L585.5 55.6 L642.4 31.1 L656.7 25 L699.4 113.7 L702.2 141.3 L747.8 141.3 L799.1 116.8 L856.1 92.3 L898.8 25 L485.8 25 Z\"><\u002Fpath>\n          <path d=\"M209.5 43.4 L257.9 46.4 L255 70.9 L286.4 70.9 L292.1 107.6 L303.5 153.5 L306.3 162.7 L337.6 181 L343.3 196.3 L351.9 214.7 L343.3 217.8 L391.8 223.9 L388.9 242.2 L371.8 251.4 L383.2 263.7 L383.2 275.9 L349 282 L303.5 288.1 L243.6 288.1 L200.9 300.4 L181 303.4 L223.7 269.8 L246.5 263.7 L223.7 254.5 L206.6 254.5 L226.5 230 L215.2 205.5 L255 202.5 L257.9 181 L240.8 165.7 L206.6 162.7 L200.9 126 L183.8 104.6 L189.5 77 L178.1 52.5 Z\"><\u002Fpath>\n          <path d=\"M172.4 147.4 L186.7 168.8 L172.4 208.6 L166.7 239.2 L129.7 245.3 L72.7 260.6 L52.8 251.4 L64.2 202.5 L55.6 174.9 L101.2 156.6 L143.9 144.3 Z\"><\u002Fpath>\n          <path d=\"M300.6 438.1 L309.2 404.4 L280.7 389.1 L209.5 373.8 L243.6 349.3 L297.8 349.3 L300.6 327.9 L289.2 315.7 L314.8 324.9 L349 324.9 L388.9 303.4 L414.5 272.8 L443 263.7 L457.3 251.4 L480.1 214.7 L497.2 202.5 L528.5 196.3 L571.2 193.3 L585.5 184.1 L579.8 153.5 L588.3 89.3 L639.6 74 L645.3 92.3 L628.2 122.9 L613.9 153.5 L625.3 171.9 L656.7 171.9 L685.2 168.8 L713.6 174.9 L742.1 187.2 L756.4 184.1 L813.3 168.8 L873.2 168.8 L901.6 171.9 L955.8 165.7 L955.8 438.1 Z\"><\u002Fpath>\n        <\u002Fg>\n        <g font-family=\"Fredoka\" font-weight=\"600\" fill=\"#86994f\">\n          <text x=\"250\" y=\"120\" text-anchor=\"middle\" font-size=\"20\">England<\u002Ftext>\n          <text x=\"108\" y=\"205\" text-anchor=\"middle\" font-size=\"16\">Ireland<\u002Ftext>\n          <text x=\"320\" y=\"420\" text-anchor=\"middle\" font-size=\"20\">France<\u002Ftext>\n          <text x=\"545\" y=\"360\" text-anchor=\"middle\" font-size=\"20\">Germany<\u002Ftext>\n          <text x=\"855\" y=\"370\" text-anchor=\"middle\" font-size=\"22\">Poland<\u002Ftext>\n          <text x=\"620\" y=\"135\" text-anchor=\"middle\" font-size=\"13\">Denmark<\u002Ftext>\n          <text x=\"560\" y=\"52\" text-anchor=\"middle\" font-size=\"14\">Norway<\u002Ftext>\n          <text x=\"815\" y=\"92\" text-anchor=\"middle\" font-size=\"14\">Sweden<\u002Ftext>\n        <\u002Fg>\n        <g font-family=\"Hanken Grotesque\" font-weight=\"600\" fill=\"#7ba6c8\" font-style=\"italic\">\n          <text x=\"440\" y=\"250\" text-anchor=\"middle\" font-size=\"17\">North Sea<\u002Ftext>\n          <text x=\"730\" y=\"240\" text-anchor=\"middle\" font-size=\"16\">Baltic Sea<\u002Ftext>\n        <\u002Fg>\n        <path id=\"routePath\" d=\"M321.7 244.1 Q 598.1 118.4 874.6 173.4\" fill=\"none\" stroke=\"#fff\" stroke-width=\"5\" stroke-dasharray=\"1 13\" stroke-linecap=\"round\" opacity=\".95\"><\u002Fpath>\n        <path ref=\"{{ mapFillRef }}\" d=\"M321.7 244.1 Q 598.1 118.4 874.6 173.4\" fill=\"none\" stroke=\"#D6303C\" stroke-width=\"6\" stroke-linecap=\"round\"><\u002Fpath>\n        <g>\n          <circle cx=\"321.7\" cy=\"244.1\" r=\"8\" fill=\"#D6303C\" stroke=\"#fff\" stroke-width=\"3\"><\u002Fcircle>\n          <text x=\"321.7\" y=\"225\" text-anchor=\"middle\" font-family=\"Fredoka\" font-size=\"16\" font-weight=\"700\" fill=\"#1c1a19\" stroke=\"#fff\" stroke-width=\"3.5\" paint-order=\"stroke\">Milton Keynes<\u002Ftext>\n        <\u002Fg>\n        <g>\n          <circle cx=\"874.6\" cy=\"173.4\" r=\"9\" fill=\"#87A428\" stroke=\"#fff\" stroke-width=\"3\"><\u002Fcircle>\n          <text x=\"874.6\" y=\"150\" text-anchor=\"middle\" font-family=\"Fredoka\" font-size=\"17\" font-weight=\"700\" fill=\"#1c1a19\" stroke=\"#fff\" stroke-width=\"3.5\" paint-order=\"stroke\">Gdańsk<\u002Ftext>\n        <\u002Fg>\n        <g ref=\"{{ mapBoatRef }}\" transform=\"translate(321.7 244.1)\">\n          <circle r=\"14\" fill=\"#fff\" stroke=\"#D6303C\" stroke-width=\"3\"><\u002Fcircle>\n          <path d=\"M-7 2 C-3 7 3 7 7 2 L5 5 C2 8 -2 8 -5 5 Z\" fill=\"#A9743F\"><\u002Fpath>\n          <rect x=\"-1\" y=\"-7\" width=\"2.4\" height=\"9\" fill=\"#7A5230\"><\u002Frect>\n          <path d=\"M0.2 -7 L6 -4 L0.2 -2 Z\" fill=\"#D6303C\"><\u002Fpath>\n        <\u002Fg>\n      <\u002Fsvg>\n    <\u002Fdiv>\n\n    <!-- MILESTONES -->\n    <h3 style=\"font-family:'Fredoka',sans-serif;font-weight:700;font-size:24px;text-align:center;margin:46px 0 22px\">Milestones on the water<\u002Fh3>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px\">\n      <sc-for list=\"{{ milestones }}\" as=\"m\" hint-placeholder-count=\"6\">\n        <div style=\"border-radius:16px;padding:18px 16px;transition:.3s;{{ m.cardStyle }}\">\n          <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:10px\">\n            <div style=\"width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Fredoka',sans-serif;font-weight:700;font-size:14px;{{ m.badgeStyle }}\">{{ m.badgeText }}<\u002Fdiv>\n            <div style=\"font-family:'Fredoka',sans-serif;font-weight:700;font-size:15px;color:{{ m.statusColor }}\">{{ m.status }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-weight:600;font-size:15px;line-height:1.3;margin-bottom:6px\">{{ m.name }}<\u002Fdiv>\n          <div style=\"font-size:13px;color:#9a8f87;font-weight:600\">{{ m.distLabel }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ GOAL + COUNTDOWN ============ -->\n<section data-screen-label=\"Goal and countdown\" style=\"max-width:1000px;margin:0 auto;padding:64px 20px\">\n  <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:24px\">\n    <!-- countdown -->\n    <div style=\"background:#fff;border:2px solid #efe9e4;border-radius:24px;padding:32px;text-align:center\">\n      <div style=\"font-family:'Fredoka',sans-serif;font-weight:700;font-size:13px;letter-spacing:.1em;text-transform:uppercase;color:#D6303C;margin-bottom:6px\">Countdown to Poland 2027<\u002Fdiv>\n      <div style=\"font-size:15px;color:#7a716b;margin-bottom:20px\">Until the 26th World Scout Jamboree<\u002Fdiv>\n      <div style=\"display:flex;justify-content:center;gap:10px\">\n        <div style=\"flex:1;background:#F7F4F2;border-radius:14px;padding:14px 6px\"><div style=\"font-family:'Fredoka',sans-serif;font-weight:700;font-size:34px;line-height:1;color:#1c1a19\">{{ cdDays }}<\u002Fdiv><div style=\"font-size:12px;color:#9a8f87;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-top:5px\">days<\u002Fdiv><\u002Fdiv>\n        <div style=\"flex:1;background:#F7F4F2;border-radius:14px;padding:14px 6px\"><div style=\"font-family:'Fredoka',sans-serif;font-weight:700;font-size:34px;line-height:1;color:#1c1a19\">{{ cdHours }}<\u002Fdiv><div style=\"font-size:12px;color:#9a8f87;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-top:5px\">hrs<\u002Fdiv><\u002Fdiv>\n        <div style=\"flex:1;background:#F7F4F2;border-radius:14px;padding:14px 6px\"><div style=\"font-family:'Fredoka',sans-serif;font-weight:700;font-size:34px;line-height:1;color:#1c1a19\">{{ cdMins }}<\u002Fdiv><div style=\"font-size:12px;color:#9a8f87;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-top:5px\">min<\u002Fdiv><\u002Fdiv>\n        <div style=\"flex:1;background:#F7F4F2;border-radius:14px;padding:14px 6px\"><div style=\"font-family:'Fredoka',sans-serif;font-weight:700;font-size:34px;line-height:1;color:#D6303C\">{{ cdSecs }}<\u002Fdiv><div style=\"font-size:12px;color:#9a8f87;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-top:5px\">sec<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ SHARE ============ -->\n<section data-screen-label=\"Share\" style=\"background:#fff;border-top:1px solid #efe9e4;padding:56px 20px\">\n  <div style=\"max-width:680px;margin:0 auto;text-align:center\">\n    <h2 style=\"font-family:'Fredoka',sans-serif;font-weight:700;font-size:30px;margin:0 0 8px\">Spread the word<\u002Fh2>\n    <p style=\"font-size:16px;color:#7a716b;margin:0 0 24px\">Can't donate right now? Sharing Jonny's row helps just as much.<\u002Fp>\n    <div style=\"display:flex;flex-wrap:wrap;justify-content:center;gap:12px\">\n      <button onclick=\"{{ shareWhatsapp }}\" style=\"cursor:pointer;border:none;background:#25D366;color:#fff;font-family:'Fredoka',sans-serif;font-weight:600;font-size:16px;padding:13px 24px;border-radius:50px\">WhatsApp<\u002Fbutton>\n      <button onclick=\"{{ shareFb }}\" style=\"cursor:pointer;border:none;background:#1877F2;color:#fff;font-family:'Fredoka',sans-serif;font-weight:600;font-size:16px;padding:13px 24px;border-radius:50px\">Facebook<\u002Fbutton>\n      <button onclick=\"{{ shareX }}\" style=\"cursor:pointer;border:none;background:#000;color:#fff;font-family:'Fredoka',sans-serif;font-weight:600;font-size:16px;padding:13px 24px;border-radius:50px\">X / Twitter<\u002Fbutton>\n      <button onclick=\"{{ copyLink }}\" style=\"cursor:pointer;border:2px solid #e0d8d1;background:#fff;color:#1c1a19;font-family:'Fredoka',sans-serif;font-weight:600;font-size:16px;padding:11px 24px;border-radius:50px\">{{ copyLabel }}<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ FOOTER ============ -->\n<footer style=\"background:#1c1a19;color:#fff;padding:54px 20px 40px;text-align:center\">\n  <img src=\"500e3bf2-56a3-4e1d-bcb9-00c8fd640d48\" alt=\"Poland 2027\" style=\"width:54px;height:54px;margin:0 auto 16px;display:block\">\n  <div style=\"font-family:'Bravely Script','Permanent Marker',cursive;text-transform:uppercase;letter-spacing:.02em;font-size:36px;line-height:1.05;max-width:460px;margin:0 auto 22px;transform:rotate(-1.5deg)\">Everything you do, do it bravely.<\u002Fdiv>\n  <a href=\"{{ donateUrl }}\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-block;background:#87A428;color:#fff;font-family:'Fredoka',sans-serif;font-weight:700;font-size:18px;text-decoration:none;padding:15px 38px;border-radius:60px;margin-bottom:24px\">Donate to send Jonny<\u002Fa>\n  <div style=\"font-size:13px;color:#9a948f;max-width:520px;margin:0 auto;line-height:1.6\">Progress is logged on Jonny's rowing tracker and updates automatically. Funds raised go toward Jonny's place at the 26th World Scout Jamboree, Poland 2027.<\u002Fdiv>\n<\u002Ffooter>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;donateUrl&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;https:\u002F\u002Fgofund.me\u002Fb99415000&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Setup&quot;},&quot;sheetId&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;1WtmjgCL2DWWYO4vbWa7rblgF4qxb8Ky6cWtZmHpBIgE&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Setup&quot;},&quot;totalKm&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:1350,&quot;min&quot;:1,&quot;max&quot;:5000,&quot;unit&quot;:&quot;km&quot;,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Setup&quot;},&quot;fallbackKm&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:45,&quot;min&quot;:0,&quot;max&quot;:5000,&quot;unit&quot;:&quot;km&quot;,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Setup&quot;},&quot;jamboreeDate&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;2027-07-31T00:00:00&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Setup&quot;},&quot;defaultUnit&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;km&quot;,&quot;mi&quot;],&quot;default&quot;:&quot;km&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Setup&quot;},&quot;goalGbp&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:1000,&quot;min&quot;:0,&quot;max&quot;:100000,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Fundraising&quot;},&quot;raisedGbp&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:0,&quot;min&quot;:0,&quot;max&quot;:100000,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Fundraising&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    const fallback = Number(props.fallbackKm ?? 45);\n    let cached = fallback;\n    try{ const c = localStorage.getItem('jonny_km'); if(c!=null && !isNaN(parseFloat(c))) cached = parseFloat(c); }catch(e){}\n    let unit = (props.defaultUnit==='mi') ? 'mi' : 'km';\n    try{ const u = localStorage.getItem('jonny_unit'); if(u==='mi'||u==='km') unit = u; }catch(e){}\n    this.state = { unit, km: cached, shownKm: 0, now: Date.now(), loaded:false, showSticky:false, copied:false };\n    this.boatRef = React.createRef();\n    this.fillRef = React.createRef();\n    this.markerRef = React.createRef();\n    this.mapBoatRef = React.createRef();\n    this.mapFillRef = React.createRef();\n    this.stickyRef = React.createRef();\n    this.routePath = null;\n  }\n  get totalKm(){ return Number(this.props.totalKm ?? 1350); }\n  toDisp(km){ return this.state.unit==='km' ? km : km*0.621371; }\n  fmt(n){ return Math.round(n).toLocaleString('en-GB'); }\n\n  componentDidMount(){\n    this.animateTo(this.state.km);\n    this.cd = setInterval(()=>this.setState({ now: Date.now() }), 1000);\n    this.onScroll = ()=>{ const s = window.scrollY > 380; if(s!==this.state.showSticky) this.setState({ showSticky: s }); };\n    window.addEventListener('scroll', this.onScroll, { passive:true });\n    this.applyGeometry();\n    this.fetchSheet();\n  }\n  componentWillUnmount(){ clearInterval(this.cd); cancelAnimationFrame(this.raf); window.removeEventListener('scroll', this.onScroll); }\n  componentDidUpdate(){ this.applyGeometry(); }\n\n  animateTo(target){\n    cancelAnimationFrame(this.raf);\n    const start = this.state.shownKm, t0 = performance.now(), dur = 1500;\n    const step = (t)=>{ const k = Math.min(1,(t-t0)/dur); const e = 1-Math.pow(1-k,3);\n      this.setState({ shownKm: start + (target-start)*e });\n      if(k<1) this.raf = requestAnimationFrame(step); };\n    this.raf = requestAnimationFrame(step);\n  }\n\n  applyGeometry(){\n    const pct = Math.max(0, Math.min(1, this.state.shownKm/this.totalKm));\n    if(this.fillRef.current) this.fillRef.current.style.width = (pct*84)+'%';\n    if(this.boatRef.current) this.boatRef.current.style.left = (8 + pct*84)+'%';\n    if(this.markerRef.current) this.markerRef.current.style.left = (8 + pct*84)+'%';\n    if(this.stickyRef.current){\n      const on = this.state.showSticky;\n      this.stickyRef.current.style.opacity = on ? '1' : '0';\n      this.stickyRef.current.style.transform = on ? 'translate(-50%,0)' : 'translate(-50%,24px)';\n      this.stickyRef.current.style.pointerEvents = on ? 'auto' : 'none';\n    }\n    if(!this.routePath) this.routePath = document.getElementById('routePath');\n    const path = this.routePath, m = this.mapBoatRef.current;\n    if(path && path.getTotalLength && m){\n      const L = path.getTotalLength();\n      const p = path.getPointAtLength(L*pct);\n      m.setAttribute('transform', `translate(${p.x} ${p.y})`);\n      if(this.mapFillRef.current){\n        this.mapFillRef.current.style.strokeDasharray = L;\n        this.mapFillRef.current.style.strokeDashoffset = String(L*(1-pct));\n      }\n    }\n  }\n\n  async fetchSheet(){\n    const id = this.props.sheetId || '1WtmjgCL2DWWYO4vbWa7rblgF4qxb8Ky6cWtZmHpBIgE';\n    try{\n      const url = `https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:csv&sheet=Sheet1`;\n      const res = await fetch(url);\n      const txt = await res.text();\n      const rows = txt.trim().split(/\\r?\\n/);\n      let sum = 0, count = 0;\n      for(let i=1;i<rows.length;i++){\n        const cols = rows[i].split(',');\n        if(cols.length<2) continue;\n        const v = parseFloat((cols[1]||'').replace(/[^0-9.\\-]/g,''));\n        if(!isNaN(v)){ sum += v; count++; }\n      }\n      if(count>0){\n        try{ localStorage.setItem('jonny_km', String(sum)); }catch(e){}\n        this.setState({ km: sum, loaded:true });\n        this.animateTo(sum);\n        return;\n      }\n      this.setState({ loaded:true });\n    }catch(e){ this.setState({ loaded:true }); }\n  }\n\n  setUnit(u){ try{ localStorage.setItem('jonny_unit', u); }catch(e){} this.setState({ unit: u }); }\n\n  share(kind){\n    const url = this.props.shareUrl || (typeof window!=='undefined' ? window.location.href : '');\n    const text = `Cheer on Jonny as he rows ${this.fmt(this.totalKm)} km from Milton Keynes to Gdańsk for the World Scout Jamboree! `;\n    let href = '';\n    if(kind==='whatsapp') href = 'https://wa.me/?text='+encodeURIComponent(text+url);\n    else if(kind==='facebook') href = 'https://www.facebook.com/sharer/sharer.php?u='+encodeURIComponent(url);\n    else if(kind==='x') href = 'https://twitter.com/intent/tweet?text='+encodeURIComponent(text)+'&url='+encodeURIComponent(url);\n    if(href) window.open(href,'_blank','noopener');\n  }\n  copyLink(){\n    const url = this.props.shareUrl || (typeof window!=='undefined' ? window.location.href : '');\n    try{ navigator.clipboard.writeText(url); this.setState({ copied:true }); setTimeout(()=>this.setState({ copied:false }),1800); }catch(e){}\n  }\n\n  renderVals(){\n    const u = this.state.unit, lab = u==='km' ? 'km' : 'mi';\n    const total = this.totalKm;\n    const shown = this.state.shownKm;\n    const remaining = Math.max(0, total - this.state.km);\n    const onSty = 'background:#fff;color:#D6303C;box-shadow:0 2px 6px rgba(0,0,0,.18)';\n    const offSty = 'background:transparent;color:#fff';\n\n    const ms = [\n      { km:0, name:'Push off from Milton Keynes' },\n      { km:280, name:'Reach the British coast' },\n      { km:560, name:'Halfway across open water' },\n      { km:850, name:'Sight the German shore' },\n      { km:1100, name:'Turn into the Baltic' },\n      { km:total, name:'Land in Gdańsk!' }\n    ];\n    const milestones = ms.map((mi,i)=>{\n      const reached = this.state.km >= mi.km - 0.001;\n      return {\n        name: mi.name,\n        distLabel: this.fmt(this.toDisp(mi.km)) + ' ' + lab,\n        status: reached ? 'Reached' : 'Upcoming',\n        statusColor: reached ? '#6B8613' : '#b3a99f',\n        badgeText: reached ? '✓' : String(i+1),\n        badgeStyle: reached ? 'background:#87A428;color:#fff' : 'background:#efe9e4;color:#b3a99f',\n        cardStyle: reached\n          ? 'background:#fff;border:2px solid #87A428;box-shadow:0 12px 26px -16px rgba(80,102,0,.6);opacity:1'\n          : 'background:#fff;border:2px dashed #ded6cf;opacity:.6'\n      };\n    });\n\n    const target = new Date(this.props.jamboreeDate || '2027-08-02T00:00:00').getTime();\n    let diff = Math.max(0, target - this.state.now);\n    const DAY = 86400000;\n    const cdDays = Math.floor(diff/DAY); diff -= cdDays*DAY;\n    const cdHours = Math.floor(diff/3600000); diff -= cdHours*3600000;\n    const cdMins = Math.floor(diff/60000); diff -= cdMins*60000;\n    const cdSecs = Math.floor(diff/1000);\n\n    const goal = Number(this.props.goalGbp ?? 1000);\n    const raised = Number(this.props.raisedGbp ?? 0);\n    const moneyPct = goal>0 ? Math.max(0, Math.min(100, raised/goal*100)) : 0;\n\n    const donateUrl = this.props.donateUrl || '#';\n\n    return {\n      lab,\n      setKm: ()=>this.setUnit('km'),\n      setMi: ()=>this.setUnit('mi'),\n      kmBtnStyle: u==='km' ? onSty : offSty,\n      miBtnStyle: u==='mi' ? onSty : offSty,\n      shownKmText: this.fmt(this.toDisp(shown)),\n      totalText: this.fmt(this.toDisp(total)),\n      remainText: this.fmt(this.toDisp(remaining)),\n      pctBig: Math.round(shown/total*100),\n      boatRef: this.boatRef,\n      fillRef: this.fillRef,\n      markerRef: this.markerRef,\n      mapBoatRef: this.mapBoatRef,\n      mapFillRef: this.mapFillRef,\n      stickyRef: this.stickyRef,\n      milestones,\n      cdDays: String(cdDays),\n      cdHours: String(cdHours).padStart(2,'0'),\n      cdMins: String(cdMins).padStart(2,'0'),\n      cdSecs: String(cdSecs).padStart(2,'0'),\n      goalText: '£' + this.fmt(goal),\n      raisedText: '£' + this.fmt(raised),\n      moneyWidth: moneyPct + '%',\n      donateUrl,\n      donatePending: donateUrl === '#' || donateUrl === '',\n      shareWhatsapp: ()=>this.share('whatsapp'),\n      shareFb: ()=>this.share('facebook'),\n      shareX: ()=>this.share('x'),\n      copyLink: ()=>this.copyLink(),\n      copyLabel: this.state.copied ? 'Link copied!' : 'Copy link'\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
